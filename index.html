<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptchaOS</title>
  <link rel="stylesheet" href="css/os.css?v=31">
</head>
<body>
  <div id="screen">

    <!-- Boot sequence -->
    <div id="boot">
      <div class="logo">CaptchaOS<br>98</div>
      <div class="tagline">the cozy OS that trusts no one</div>
      <div class="barwrap">
        <div class="bar"><i></i></div>
      </div>
      <div class="bootline blink">Starting CaptchaOS&hellip;</div>
    </div>

    <!-- Login / captcha gauntlet -->
    <div id="login" class="hidden">
      <div class="login-card bevel-out">
        <div class="head">
          <h1>CaptchaOS 98</h1>
          <div class="sub">Please verify you are a human to log in.</div>
        </div>
        <div class="login-body">
          <div class="login-prog"></div>
          <div class="login-host"></div>
          <div class="login-hint"></div>
        </div>
      </div>
    </div>

    <!-- Desktop (cozy nighttime scene) -->
    <div id="desktop">
      <div class="night-sky"></div>
      <div class="stars"></div>
      <div class="meteors">
        <i class="meteor m1"></i>
        <i class="meteor m2"></i>
        <i class="meteor m3"></i>
      </div>
      <div class="moon"><i></i></div>
      <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
      </div>
      <div class="rain"></div>
      <div class="hill"></div>
      <div class="lamp-glow"></div>
      <div class="icons"></div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar" class="bevel-out">
      <div id="startbtn" class="bevel-out"><span class="s">🪟</span><span>Start</span></div>
      <div id="tasks"></div>

      <!-- Spud the Potato — the OS mascot who wants nothing from you -->
      <div id="spud" hidden>
        <div class="spud-guy" role="button" tabindex="0" aria-label="Spud the Potato — click to talk">
          <div class="spud-brolly"></div>
          <div class="spud-steam"><i></i><i></i><i></i></div>
          <div class="spud-cup"></div>
          <div class="spud-body">
            <span class="spud-dimple d1"></span>
            <span class="spud-dimple d2"></span>
            <span class="spud-dimple d3"></span>
            <div class="spud-cheek c1"></div>
            <div class="spud-cheek c2"></div>
            <div class="spud-eyes"><span class="eye"><b></b></span><span class="eye"><b></b></span></div>
            <div class="spud-mouth"></div>
          </div>
        </div>
        <div class="spud-bubble">
          <div class="sb-name">Spud</div>
          <div class="sb-text"></div>
        </div>
      </div>

      <div id="tray" class="bevel-in">
        <span id="mute" title="Toggle sound">🔊</span>
        <span id="clock">--:--</span>
      </div>
    </div>

    <!-- Start menu -->
    <div id="startmenu" class="bevel-out">
      <div class="banner">CaptchaOS</div>
      <div class="items"></div>
    </div>

    <!-- CRT scanline overlay -->
    <div id="crt"></div>

  </div>
  <script src="js/audio.js?v=30"></script>
  <script src="js/wm.js?v=30"></script>
  <script src="js/captcha.js?v=30"></script>
  <script src="js/gauntlet.js?v=30"></script>
  <script src="js/finale.js?v=30"></script>
  <script src="js/browser.js?v=30"></script>
  <script src="js/snake.js?v=30"></script>
  <script src="js/fog.js?v=30"></script>
  <script src="js/mixer.js?v=30"></script>
  <script src="js/spud_pet.js?v=31"></script>
  <script src="js/presence.js?v=30"></script>
  <script src="js/spud.js?v=30"></script>
  <script src="js/os.js?v=31"></script>
</body>
</html>
